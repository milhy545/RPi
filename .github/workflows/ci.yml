name: RPi Dashboard CI

on:
  push:
  pull_request:
    branches: [ master, main ]

jobs:
  verify-done:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install uv and sync dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          uv sync --dev

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Add .venv to PATH
        run: |
          echo "${GITHUB_WORKSPACE}/.venv/bin" >> $GITHUB_PATH

      - name: Run project CI (core)
        env:
          STRICT_SECURITY_TOOLS: '1'
        run: |
          chmod +x tools/*.sh tools/*.py
          tools/run-ci.sh

      # lint/type/coverage tools are installed via uv sync

      - name: Type checking with mypy (scoped)
        run: |
          uv run mypy webserver.py handlers.py router.py config.py --ignore-missing-imports

      - name: Lint with ruff (blocking)
        run: |
          uv run ruff check . --select E9,F63,F7,F82

      - name: Run tests with coverage
        run: |
          uv run pytest --cov=.




      - name: Upload CI reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rpi-dashboard-ci-reports
          path: conductor/ci/reports/*.md
          if-no-files-found: ignore

  agent-approval:
    name: agent-approval
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    needs: verify-done
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Approve the verified pull request
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr review "$PR_URL" --approve \
            --body "Automated approval after the required RPi Dashboard CI completed successfully."
