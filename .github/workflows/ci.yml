name: RPi Dashboard CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  verify-done:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install lightweight CI tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install bandit pip-audit || true
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run project CI
        env:
          STRICT_SECURITY_TOOLS: '0'
        run: |
          chmod +x tools/*.sh tools/*.py
          tools/run-ci.sh

      - name: Upload CI reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rpi-dashboard-ci-reports
          path: conductor/ci/reports/*.md
          if-no-files-found: ignore
